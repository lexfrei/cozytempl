# English — the canonical source of truth for message IDs.
#
# Convention: IDs use dot-separated namespaces (nav.dashboard,
# action.save, error.forbidden). Never rename an ID after shipping
# it — translation files in other languages key on the ID, and a
# rename leaves every non-English locale with a missing key.
# Deprecate by replacing the value, not the ID.

