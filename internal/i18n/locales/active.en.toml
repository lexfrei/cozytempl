# --- Profile page ---

[page.profile.noGroups]
other = "(none)"

[page.profile.howRbac]
other = "How RBAC is enforced"

[page.profile.passthrough]
other = "Your OpenID Connect ID token is forwarded directly to the Kubernetes API server as an Authorization: Bearer credential. The API server validates the token against the same Keycloak issuer you logged in through. Cozytempl's own ServiceAccount has zero cluster permissions — a compromise of the cozytempl process cannot impersonate you or anyone else. Your token is automatically refreshed shortly before it expires, so active sessions keep working without re-login."

[page.profile.byok]
other = "You authenticated by uploading a kubeconfig. It is stored encrypted inside your session cookie and used to talk to the Kubernetes API on every request. The cozytempl ServiceAccount has no cluster permissions of its own — all authority comes from the kubeconfig you provided. Log out to discard the stored kubeconfig."

[page.profile.impersonation]
other = "Every Kubernetes call made on your behalf is impersonated: cozytempl sends Impersonate-User and Impersonate-Group headers equal to the values above. The API server evaluates RBAC as you, not as the service account running cozytempl, so you only see resources you have real access to. This mode is deprecated in favour of passthrough — migrate when your API server is OIDC-configured."

[page.profile.dev]
other = "Development mode is active. Authentication is disabled. Every request is served as the local process identity with full privileges. NEVER enable this mode in a production or multi-user deployment."

[page.profile.devStrong]
other = "Development mode is active."

[page.profile.unknown]
other = "The active authentication mode is not recognised. This is a configuration bug — contact your administrator."

# --- Kubeconfig upload page (authpage + page) ---

[page.kubeconfig.title]
other = "Upload kubeconfig"

[page.kubeconfig.modeIntro]
other = "cozytempl is running in bring-your-own-kubeconfig mode. Upload a kubeconfig file that gives you access to your Kubernetes cluster; it will be stored encrypted inside your session cookie and used for every request until you log out."

[page.kubeconfig.hint1]
other = "The kubeconfig must use a static token or client certificate. Exec plugins are rejected — generate a static token with kubectl create token first."

[page.kubeconfig.hint2]
other = "Size is capped at 32 KB. Strip unused contexts with kubectl config view --minify --flatten."

[page.kubeconfig.hint3]
other = "The cluster URL must be reachable from the cozytempl pod."

[page.kubeconfig.fileLabel]
other = "kubeconfig file"

[page.kubeconfig.submit]
other = "Upload and continue"

# --- Token paste page (authpage + page) ---

[page.token.title]
other = "Sign in with token"

[page.token.modeIntro]
other = "cozytempl is running in token-paste mode. Paste a Kubernetes Bearer token that gives you access to your cluster; it will be stored encrypted inside your session cookie and used as the Bearer credential for every request until you log out."

[page.token.hint1]
other = "Any Kubernetes Bearer token works — typically a ServiceAccount token or one minted with kubectl create token. Short-lived tokens (OIDC ID tokens, kubectl create token with --duration) expire at the embedded time and cozytempl will start returning errors on k8s calls when they do; paste a fresh one and continue."

[page.token.hint2]
other = "The token is tested against the apiserver with a SelfSubjectAccessReview before it lands in your session, so an invalid or expired token is rejected up front."

[page.token.fieldLabel]
other = "Bearer token"

[page.token.submit]
other = "Sign in"

