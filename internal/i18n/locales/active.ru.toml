# --- Profile page ---

[page.profile.noGroups]
other = "(нет)"

[page.profile.howRbac]
other = "Как применяется RBAC"

[page.profile.passthrough]
other = "Ваш токен OpenID Connect передаётся напрямую в API-сервер Kubernetes как учётные данные Authorization: Bearer. API-сервер проверяет токен через тот же Keycloak, через который вы вошли. Собственный ServiceAccount cozytempl не имеет прав на кластер — компрометация процесса cozytempl не позволит выдать себя за вас или кого-либо другого. Токен автоматически обновляется до истечения срока, поэтому активные сессии продолжают работать без повторного входа."

[page.profile.byok]
other = "Вы вошли, загрузив kubeconfig. Он хранится зашифрованным в cookie сессии и используется при каждом запросе к Kubernetes API. ServiceAccount cozytempl не имеет собственных прав на кластер — все права берутся из загруженного вами kubeconfig. Выйдите из системы, чтобы удалить сохранённый kubeconfig."

[page.profile.impersonation]
other = "Каждый вызов Kubernetes выполняется с имперсонацией: cozytempl отправляет заголовки Impersonate-User и Impersonate-Group с вашими значениями. API-сервер применяет RBAC от вашего имени, а не от имени сервисного аккаунта cozytempl, поэтому вы видите только ресурсы, к которым у вас есть реальный доступ. Этот режим устарел и заменён passthrough — выполните миграцию, когда ваш API-сервер будет настроен для OIDC."

[page.profile.dev]
other = "Активирован режим разработки. Аутентификация отключена. Каждый запрос выполняется с полными правами локального процесса. НИКОГДА не включайте этот режим в боевой или многопользовательской среде."

[page.profile.devStrong]
other = "Активирован режим разработки."

[page.profile.unknown]
other = "Активный режим аутентификации не распознан. Это ошибка конфигурации — обратитесь к администратору."

