[page.kubeconfig.title]
other = "Загрузить kubeconfig"

[page.kubeconfig.modeIntro]
other = "cozytempl работает в режиме bring-your-own-kubeconfig. Загрузите файл kubeconfig, дающий доступ к вашему кластеру Kubernetes; он будет храниться зашифрованным в cookie сессии и использоваться при каждом запросе до выхода из системы."

[page.kubeconfig.hint1]
other = "Kubeconfig должен использовать статический токен или клиентский сертификат. Exec-плагины не поддерживаются — сначала создайте статический токен командой kubectl create token."

[page.kubeconfig.hint2]
other = "Размер ограничен 32 КБ. Уберите лишние контексты командой kubectl config view --minify --flatten."

[page.kubeconfig.hint3]
other = "URL кластера должен быть доступен из пода cozytempl."

[page.kubeconfig.fileLabel]
other = "Файл kubeconfig"

