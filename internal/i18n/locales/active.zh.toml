other = "RBAC 执行方式"

[page.profile.passthrough]
other = "您的 OpenID Connect ID 令牌将直接以 Authorization: Bearer 凭据转发给 Kubernetes API 服务器。API 服务器根据您登录时使用的同一 Keycloak 颁发者验证令牌。cozytempl 自身的 ServiceAccount 没有集群权限——即使 cozytempl 进程遭到入侵，也无法冒充您或其他任何人。令牌会在过期前自动刷新，因此无需重新登录即可保持会话。"

[page.profile.byok]
other = "您通过上传 kubeconfig 完成了身份验证。它以加密形式存储在会话 Cookie 中，并用于每次 Kubernetes API 请求。cozytempl ServiceAccount 本身没有集群权限——所有权限来自您提供的 kubeconfig。登出即可丢弃已存储的 kubeconfig。"

[page.profile.impersonation]
other = "代表您发出的每个 Kubernetes 调用都通过冒充执行：cozytempl 发送与上述值相同的 Impersonate-User 和 Impersonate-Group 标头。API 服务器以您的身份评估 RBAC，因此您只能看到您真正有权访问的资源。此模式已弃用，建议迁移到直通模式。"

[page.profile.dev]
other = "开发模式已激活。身份验证已禁用。每个请求都以具有完整权限的本地进程身份运行。切勿在生产或多用户环境中启用此模式。"

[page.profile.devStrong]
other = "开发模式已激活。"

[page.profile.unknown]
