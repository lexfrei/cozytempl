# --- Kubeconfig upload page ---

[page.kubeconfig.title]
other = "上传 kubeconfig"

[page.kubeconfig.modeIntro]
other = "cozytempl 正在以自带 kubeconfig 模式运行。请上传可访问您 Kubernetes 集群的 kubeconfig 文件；它将以加密形式存储在会话 Cookie 中，并用于登出前的每次请求。"

[page.kubeconfig.hint1]
other = "kubeconfig 必须使用静态令牌或客户端证书。不支持 Exec 插件——请先使用 kubectl create token 生成静态令牌。"

[page.kubeconfig.hint2]
other = "大小限制为 32 KB。使用 kubectl config view --minify --flatten 移除未使用的上下文。"

[page.kubeconfig.hint3]
other = "集群 URL 必须可从 cozytempl Pod 访问。"

[page.kubeconfig.fileLabel]
other = "kubeconfig 文件"

[page.kubeconfig.submit]
other = "上传并继续"

# --- Token paste page ---

[page.token.title]
other = "使用令牌登录"

[page.token.modeIntro]
other = "cozytempl 正在以令牌粘贴模式运行。粘贴可访问 Kubernetes 集群的 Bearer 令牌；它将加密存储在会话 Cookie 中，并在每次请求中用作 Bearer 凭据，直到您退出登录。"

[page.token.hint1]
other = "任何 Kubernetes Bearer 令牌均可使用 — 通常是 ServiceAccount 令牌或 kubectl create token 生成的令牌。短期令牌（OIDC ID 令牌、带 --duration 的 kubectl create token）会在其内嵌时间过期，届时 cozytempl 将在 k8s 调用上返回错误；请粘贴新的令牌继续使用。"

[page.token.hint2]
other = "在写入会话之前，令牌会通过 SelfSubjectAccessReview 向 apiserver 发起一次校验；无效或过期的令牌会被立刻拒绝。"

[page.token.fieldLabel]
other = "Bearer 令牌"

[page.token.submit]
other = "登录"

