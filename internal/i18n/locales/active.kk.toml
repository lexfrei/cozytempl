# --- Profile page ---

[page.profile.noGroups]
other = "(жоқ)"

[page.profile.howRbac]
other = "RBAC қалай қолданылады"

[page.profile.passthrough]
other = "OpenID Connect токеніңіз Kubernetes API серверіне Authorization: Bearer тіркелгі деректері ретінде тікелей жіберіледі. API сервері токенді сіз кірген Keycloak арқылы тексереді. cozytempl ServiceAccount кластерге ешқандай рұқсаты жоқ — cozytempl процесінің бұзылуы сізді немесе басқа біреуді жалған сеппейді. Токен мерзімі аяқталмас бұрын автоматты түрде жаңартылады, сондықтан белсенді сеанстар қайта кіруді қажет етпейді."

[page.profile.byok]
other = "Сіз kubeconfig жүктеп кіруді растадыңыз. Ол сеанс cookie-да шифрланған түрде сақталады және Kubernetes API-ге әрбір сұраныста қолданылады. cozytempl ServiceAccount кластерге өз рұқсаты жоқ — барлық рұқсаттар сіз берген kubeconfig-тен алынады. Сақталған kubeconfig-ті жою үшін жүйеден шығыңыз."

[page.profile.impersonation]
other = "Сіздің атыңыздан жасалған әрбір Kubernetes шақыруы имперсонациямен орындалады: cozytempl жоғарыдағы мәндерге тең Impersonate-User және Impersonate-Group тақырыптарын жібереді. API сервері RBAC-ты сіздің атыңыздан бағалайды, сондықтан сіз тек нақты қол жеткізе алатын ресурстарды ғана көресіз. Бұл режим ескірген және passthrough-мен алмастырылған."

[page.profile.dev]
other = "Әзірлеуші режимі қосулы. Аутентификация өшірілген. Әрбір сұраныс толық артықшылықпен жергілікті процесс ретінде орындалады. Бұл режимді ешқашан өндірістік немесе көп пайдаланушылы ортада іске қоспаңыз."

[page.profile.devStrong]
other = "Әзірлеуші режимі қосулы."

[page.profile.unknown]
other = "Белсенді аутентификация режимі танылмады. Бұл конфигурация қатесі — әкімшіге хабарласыңыз."

