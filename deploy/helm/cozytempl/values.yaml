# cozytempl Helm chart values.

# Container image.
image:
  repository: ghcr.io/lexfrei/cozytempl
  tag: ""  # Defaults to Chart.appVersion if left empty.
  pullPolicy: IfNotPresent

# Number of cozytempl replicas. One is plenty for a small homelab
# setup; a real MSP deployment will want 2+ for rolling updates.
replicaCount: 1

# Service resource exposing the pod. ClusterIP is the default
# because ingress is expected to be handled by a separate
# Ingress/Gateway resource the operator already manages.
service:
  type: ClusterIP
  port: 8080

# Container resource requests and limits. Cozytempl is a thin
# proxy over the k8s API so the defaults are modest; raise the
# memory limit if you see OOM on a 10k-app cluster before
# pagination lands.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Probes. Cozytempl serves /healthz and /readyz unconditionally
# (no auth) so kubelet can hit them without credentials.
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /readyz
    initialDelaySeconds: 2
    periodSeconds: 5

# Runtime configuration. Every field maps 1:1 to a COZYTEMPL_*
# env var in the Deployment.
config:
  # Listening address. 0.0.0.0:8080 is the normal pod-network
  # setup; change only if you need to bind to a specific iface.
  listenAddr: ":8080"

  # Authentication mode. One of:
  #   passthrough          - OIDC ID token forwarded as Bearer to the
  #                          Kubernetes API. The cozytempl pod SA has
  #                          zero k8s RBAC. Recommended for new
  #                          deployments against an OIDC-enabled
  #                          API server.
  #   byok                 - User uploads their own kubeconfig on
  #                          first access. The uploaded kubeconfig
  #                          lives encrypted in the session cookie.
  #                          No OIDC, no IdP, no cluster RBAC on the
  #                          cozytempl SA.
  #   dev                  - Authentication disabled. Every request
  #                          treated as dev-admin with system:masters.
  #                          NEVER use in production.
  #   impersonation-legacy - Legacy Impersonate-User / -Groups
  #                          headers. The cozytempl SA needs
  #                          cluster-wide impersonate permissions.
  #                          Deprecated; migrate to passthrough.
  authMode: passthrough

  # Enable dev mode — disables auth, treats every request as
  # dev-admin with system:masters. NEVER enable in production.
  # Equivalent to authMode=dev and wins when both are set, preserved
  # for backwards compatibility with older values files.
  devMode: false

  # OpenTelemetry tracing. Leave empty to disable tracing
  # entirely (the global TracerProvider stays at its zero-cost
  # default). Set otlpEndpoint to your collector and cozytempl
  # will emit one span per HTTP request plus span.context
  # propagation to impersonated k8s calls.
  #
  # The exporter defaults to gRPC OTLP. Set otlpProtocol to
  # "http/protobuf" to use the HTTP-over-protobuf variant.
  tracing:
    otlpEndpoint: ""  # e.g. tempo.observability:4317 (gRPC) or http://tempo:4318 (HTTP)
    otlpProtocol: ""  # "" (gRPC default) or "http/protobuf"
    serviceName: ""   # defaults to "cozytempl"

  # OIDC configuration. Required in passthrough and
  # impersonation-legacy modes. BYOK and dev modes ignore it.
  oidc:
    issuerURL: ""       # e.g. https://keycloak.example.com/realms/cozystack
    # Optional backend-only issuer URL. When set, cozytempl uses
    # it for token endpoint / JWKS calls (typically a cluster-
    # internal Keycloak service like
    # http://keycloak.cozy-keycloak.svc:8080/realms/cozystack)
    # while the user-facing issuer stays external. Saves latency
    # on the refresh path and avoids ingress egress.
    internalIssuerURL: ""
    clientID: ""        # e.g. cozytempl
    redirectURL: ""     # e.g. https://cozytempl.example.com/auth/callback

    # clientSecret and sessionSecret go into a Secret. See
    # existingSecret below to reuse a secret managed outside
    # this chart.
    clientSecret: ""
    sessionSecret: ""   # 32+ random bytes; `openssl rand -base64 32`

  # If set, the chart reads clientSecret and sessionSecret from
  # this existing Secret instead of creating its own. Keys:
  #   - oidc-client-secret
  #   - session-secret
  existingSecret: ""

# ServiceAccount + ClusterRole. RBAC shape depends on authMode:
#   passthrough / byok:    main SA has no k8s permissions at all,
#                          and a separate watcher SA with list+watch
#                          on helmreleases runs the HelmRelease
#                          watcher (used by the SSE event stream).
#   impersonation-legacy:  main SA keeps cluster-wide impersonate
#                          rights; watcher SA is still created for
#                          belt-and-suspenders.
#   dev:                   no ClusterRole / ClusterRoleBinding are
#                          rendered; the local kubeconfig drives
#                          identity.
serviceAccount:
  create: true
  name: ""  # Defaults to the chart fullname.
  annotations: {}

rbac:
  # Render ClusterRole / ClusterRoleBinding / watcher SA according
  # to the active authMode. Disable only if you are wiring RBAC
  # externally (e.g. via a policy controller that watches the
  # ServiceAccount and materialises the right role).
  create: true

# HelmRelease watcher. In passthrough and byok modes the main
# cozytempl SA has zero k8s permissions, so the watcher runs
# under its own narrow SA (cozytempl-watcher) that only has
# list+watch on helmreleases.helm.toolkit.fluxcd.io. Automatically
# enabled whenever authMode != "dev".
watcher:
  enabled: true

# Pod security context. Non-root by default — the container
# image is built with USER 65532:65532 so fsGroup is not
# required.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Arbitrary additional labels and annotations.
commonLabels: {}
commonAnnotations: {}

# nodeSelector / tolerations / affinity. Empty = schedule
# anywhere the defaults allow. Helpful to pin cozytempl to a
# control-plane-adjacent node pool on large MSP clusters.
nodeSelector: {}
tolerations: []
affinity: {}
