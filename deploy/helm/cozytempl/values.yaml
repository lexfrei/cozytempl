# cozytempl Helm chart values.

# Container image.
image:
  repository: ghcr.io/lexfrei/cozytempl
  tag: ""  # Defaults to Chart.appVersion if left empty.
  pullPolicy: IfNotPresent

# Number of cozytempl replicas. One is plenty for a small homelab
# setup; a real MSP deployment will want 2+ for rolling updates.
replicaCount: 1

# Service resource exposing the pod. ClusterIP is the default
# because the ingress story is owned either by the optional
# Ingress / HTTPRoute templates below (ingress.enabled /
# httpRoute.enabled) or by resources the operator manages
# outside the chart.
service:
  type: ClusterIP
  port: 8080

# Optional networking.k8s.io/v1 Ingress. Disabled by default.
# Enable for the classic nginx-ingress / Traefik / HAProxy-ingress
# deployment pattern. For Gateway API, see httpRoute below — the
# two can be enabled simultaneously if you need both during a
# migration.
ingress:
  enabled: false
  # IngressClass name. Empty leaves the selection to the cluster's
  # default IngressClass. Common values: nginx, traefik, haproxy.
  className: ""
  # Ingress-controller-specific annotations. Kept here (not in
  # commonAnnotations) so they do not leak onto the Deployment /
  # Service / ServiceAccount objects.
  annotations: {}
  # Host rules. Each entry accepts a list of path rules; pathType
  # defaults to Prefix if omitted.
  hosts:
    - host: cozytempl.example.com
      paths:
        - path: /
          pathType: Prefix
  # TLS block. Leave empty to serve plain HTTP (fine for cluster-
  # internal setups behind an outer TLS-terminating proxy like
  # Cloudflare Tunnel).
  tls: []
  # Example TLS block:
  # tls:
  #   - hosts: [cozytempl.example.com]
  #     secretName: cozytempl-tls

# Optional gateway.networking.k8s.io/v1 HTTPRoute. Disabled by
# default. Enable for Gateway-API-native clusters: Contour, Envoy
# Gateway, Cilium, Istio's Gateway API mode, etc. The chart does
# NOT create the Gateway resource itself — that is a cluster-
# level decision owned by the platform team.
#
# Shape follows the lexfrei/charts convention (rules[] with
# per-rule matches / filters / weight) so the same values block
# copy-pastes between charts.
httpRoute:
  enabled: false
  annotations: {}
  # List of parentRefs the HTTPRoute attaches to. Each entry maps
  # to gateway.networking.k8s.io/v1 ParentReference.
  parentRefs:
    - name: gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - cozytempl.example.com
  # List of HTTPRouteRule entries. Empty renders a single default
  # catch-all PathPrefix `/` rule. A rule with a `weight` drives
  # canary traffic splitting; a rule with `filters` supports
  # HeaderModifier / RequestRedirect / URLRewrite from the
  # standard HTTPRouteFilter set.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

# Container resource requests and limits. Cozytempl is a thin
# proxy over the k8s API so the defaults are modest; raise the
# memory limit if you see OOM on a 10k-app cluster before
# pagination lands.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Probes. Cozytempl serves /healthz and /readyz unconditionally
# (no auth) so kubelet can hit them without credentials.
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /readyz
    initialDelaySeconds: 2
    periodSeconds: 5

# Runtime configuration. Every field maps 1:1 to a COZYTEMPL_*
# env var in the Deployment.
config:
  # Listening address. 0.0.0.0:8080 is the normal pod-network
  # setup; change only if you need to bind to a specific iface.
  listenAddr: ":8080"

  # Authentication mode. One of:
  #   passthrough          - OIDC ID token forwarded as Bearer to the
  #                          Kubernetes API. The cozytempl pod SA has
  #                          zero k8s RBAC. Recommended for new
  #                          deployments against an OIDC-enabled
  #                          API server.
  #   byok                 - User uploads their own kubeconfig on
  #                          first access. The uploaded kubeconfig
  #                          lives encrypted in the session cookie.
  #                          No OIDC, no IdP, no cluster RBAC on the
  #                          cozytempl SA.
  #   token                - User pastes a Kubernetes Bearer token
  #                          on first access. The token is stored
  #                          encrypted in the session cookie and
  #                          used as the Bearer credential for every
  #                          k8s call. Same zero-RBAC stance as
  #                          passthrough and byok. Suited to clusters
  #                          without an OIDC IdP where a single-paste
  #                          login is preferable to assembling a full
  #                          kubeconfig. A revoked token fails at
  #                          first k8s call after revocation — log
  #                          out and paste a fresh one.
  #   dev                  - Authentication disabled. Every request
  #                          treated as dev-admin with system:masters.
  #                          NEVER use in production.
  #   impersonation-legacy - Legacy Impersonate-User / -Groups
  #                          headers. The cozytempl SA needs
  #                          cluster-wide impersonate permissions.
  #                          Deprecated; migrate to passthrough.
  authMode: passthrough

  # Enable dev mode — disables auth, treats every request as
  # dev-admin with system:masters. NEVER enable in production.
  # Equivalent to authMode=dev and wins when both are set, preserved
  # for backwards compatibility with older values files.
  devMode: false

  # trustForwardedHeaders enables X-Forwarded-For parsing for the
  # pre-auth IP rate limiter on /auth/kubeconfig and /auth/token.
  # Only set to true when cozytempl runs behind a reverse proxy
  # that strips client-supplied XFF (Ingress, Cloudflare Tunnel,
  # service mesh). Leaving it false means the limiter keys strictly
  # on TCP RemoteAddr so a hostile client cannot spoof XFF to spin
  # up fresh buckets. Maps to COZYTEMPL_TRUST_FORWARDED_HEADERS.
  trustForwardedHeaders: false

  # When non-empty, cozytempl starts a SEPARATE HTTP listener on
  # this address and mounts net/http/pprof on /debug/pprof/*. The
  # public listener never exposes pprof. Typical value:
  # "localhost:6060" — reach it via `kubectl port-forward`. Leave
  # empty to disable. pprof is not hardened against hostile
  # traffic, so never bind it on a network an attacker can reach.
  debugPprofAddr: ""

  # OpenTelemetry tracing. Leave empty to disable tracing
  # entirely (the global TracerProvider stays at its zero-cost
  # default). Set otlpEndpoint to your collector and cozytempl
  # will emit one span per HTTP request plus span.context
  # propagation to impersonated k8s calls.
  #
  # The exporter defaults to gRPC OTLP. Set otlpProtocol to
  # "http/protobuf" to use the HTTP-over-protobuf variant.
  tracing:
    otlpEndpoint: ""  # e.g. tempo.observability:4317 (gRPC) or http://tempo:4318 (HTTP)
    otlpProtocol: ""  # "" (gRPC default) or "http/protobuf"
    serviceName: ""   # defaults to "cozytempl"

  # OIDC configuration. Required in passthrough and
  # impersonation-legacy modes. BYOK and dev modes ignore it.
  oidc:
    issuerURL: ""       # e.g. https://keycloak.example.com/realms/cozystack
    # Optional backend-only issuer URL. When set, cozytempl uses
    # it for token endpoint / JWKS calls (typically a cluster-
    # internal Keycloak service like
    # http://keycloak.cozy-keycloak.svc:8080/realms/cozystack)
    # while the user-facing issuer stays external. Saves latency
    # on the refresh path and avoids ingress egress.
    internalIssuerURL: ""
    clientID: ""        # e.g. cozytempl
    redirectURL: ""     # e.g. https://cozytempl.example.com/auth/callback

    # clientSecret and sessionSecret go into a Secret. See
    # existingSecret below to reuse a secret managed outside
    # this chart.
    clientSecret: ""
    sessionSecret: ""   # 32+ random bytes; `openssl rand -base64 32`

  # If set, the chart reads clientSecret and sessionSecret from
  # this existing Secret instead of creating its own. Keys:
  #   - oidc-client-secret
  #   - session-secret
  existingSecret: ""

# ServiceAccount + ClusterRole. RBAC shape depends on authMode:
#   passthrough / byok:    main SA has no k8s permissions at all,
#                          and a separate watcher SA with list+watch
#                          on helmreleases runs the HelmRelease
#                          watcher (used by the SSE event stream).
#   impersonation-legacy:  main SA keeps cluster-wide impersonate
#                          rights; watcher SA is still created for
#                          belt-and-suspenders.
#   dev:                   no ClusterRole / ClusterRoleBinding are
#                          rendered; the local kubeconfig drives
#                          identity.
serviceAccount:
  create: true
  name: ""  # Defaults to the chart fullname.
  annotations: {}

rbac:
  # Render ClusterRole / ClusterRoleBinding / watcher SA according
  # to the active authMode. Disable only if you are wiring RBAC
  # externally (e.g. via a policy controller that watches the
  # ServiceAccount and materialises the right role).
  create: true

# HelmRelease watcher. In passthrough and byok modes the main
# cozytempl SA has zero k8s permissions, so the watcher runs
# under its own narrow SA (cozytempl-watcher) that only has
# list+watch on helmreleases.helm.toolkit.fluxcd.io. Automatically
# enabled whenever authMode != "dev".
watcher:
  enabled: true

# FormDefinition CRD — operator-authored UI overlays for the
# schema-driven forms cozytempl generates from each
# ApplicationDefinition's openAPISchema. The CRD manifest itself
# lives in deploy/helm/cozytempl/crds/formdefinition.yaml and
# Helm 3 installs it once at pre-install (not upgraded by helm
# upgrade — CRDs are a cluster-wide contract).
#
# readerBinding controls the ClusterRoleBinding that grants
# get/list/watch on formdefinitions.cozytempl.cozystack.io to
# ordinary cozytempl users. Every UI render fetches
# FormDefinitions through the user's impersonated Kubernetes
# identity, so without this RBAC the overlays are silently
# ignored and the form falls back to schema-only rendering.
# Safe to default-bind to system:authenticated because the
# FormDefinition payload carries operator-authored UI strings,
# not secrets.
formDefinition:
  readerBinding:
    # Disable if you wire the read RBAC out-of-band or ship a
    # stricter policy via an admission controller.
    create: true
    # Override to scope the audience tighter — e.g. a specific
    # Group or a SubjectAccessReview-driven ClusterRole. Empty
    # binds to system:authenticated.
    subjects: []

# Pod security context. Non-root by default — the container
# image is built with USER 65532:65532 so fsGroup is not
# required.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Arbitrary additional labels and annotations.
commonLabels: {}
commonAnnotations: {}

# nodeSelector / tolerations / affinity. Empty = schedule
# anywhere the defaults allow. Helpful to pin cozytempl to a
# control-plane-adjacent node pool on large MSP clusters.
nodeSelector: {}
tolerations: []
affinity: {}

# Optional networking.k8s.io/v1 NetworkPolicy. Disabled by
# default — every cluster has a different egress story so
# flipping a restrictive policy on without explicit buy-in
# would break perfectly fine installs. Shape follows
# lexfrei/charts convention.
networkPolicy:
  enabled: false
  # Extra ingress rules layered on top of the default "allow
  # cluster pods to hit the HTTP port".
  ingress: []
  # Extra egress rules layered on top of the default "allow DNS
  # and HTTPS everywhere". Use for non-standard apiserver ports
  # or OTLP collectors on a non-default port.
  egress: []

# Optional policy/v1 PodDisruptionBudget. Only rendered when
# BOTH enabled=true AND replicaCount>1 — a PDB on a single
# replica is both useless and actively breaks node drains.
# Set exactly one of minAvailable / maxUnavailable.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# Optional autoscaling/v2 HorizontalPodAutoscaler. cozytempl
# is stateless (cookie-stored sessions) so HPA is trivially
# safe. Disabled by default because most installs don't need
# it — flip on for multi-tenant MSP scenarios with bursty
# traffic patterns.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  # Leave targetMemoryUtilizationPercentage empty to scale on
  # CPU only. Set to a percentage to enable the memory metric.
  targetMemoryUtilizationPercentage: ""
  # customMetrics is a free-form list of autoscaling/v2
  # MetricSpec entries. Use for external / object metrics
  # (e.g. request-rate from a service mesh).
  customMetrics: []
  # behavior maps directly to autoscaling/v2 HPAScalingRules.
  # Leave empty for the upstream defaults (gentle scale-up,
  # slow scale-down).
  behavior: {}

# Optional monitoring.coreos.com/v1 ServiceMonitor for the
# Prometheus Operator. Cozytempl serves /metrics on the HTTP
# port, so enable this if you want the scrape config to live
# as a CR alongside the release instead of a hand-rolled
# Prometheus scrape_config.
serviceMonitor:
  enabled: false
  # Scrape interval. Empty = operator default (usually 30s).
  interval: ""
  scrapeTimeout: ""
  # Target path on the HTTP port. Defaults to /metrics.
  path: /metrics
  # Extra labels on the ServiceMonitor resource itself (the
  # Prometheus instance selector typically matches on one).
  labels: {}
  jobLabel: ""
  honorLabels: false
  metricRelabelings: []
  relabelings: []

# Optional autoscaling.k8s.io/v1 VerticalPodAutoscaler.
# updateMode is one of Off / Initial / Recreate / Auto. Auto
# is the useful default — VPA evicts pods to apply new
# requests. Do NOT enable alongside autoscaling.enabled
# without a resourcePolicy that excludes the metric the HPA
# scales on — otherwise they fight.
vpa:
  enabled: false
  updateMode: Auto
  # Freeform resourcePolicy passed verbatim. Use to exclude
  # containers or cap min/max bounds.
  resourcePolicy: {}
