apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cozytempl.fullname" . }}
  labels:
    {{- include "cozytempl.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cozytempl.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cozytempl.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when config changes even if the image is the
        # same — the checksum of the rendered Secret flips and
        # the Deployment hashes its podTemplate, which triggers
        # a rolling update on the next `helm upgrade`.
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.commonAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "cozytempl.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: cozytempl
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Env var names match what internal/config/config.go
            # actually reads. COZYTEMPL_AUTH_MODE is the new
            # primary knob; COZYTEMPL_DEV_MODE is preserved so
            # older values files keep working.
            - name: LISTEN_ADDR
              value: {{ .Values.config.listenAddr | quote }}
            - name: COZYTEMPL_AUTH_MODE
              value: {{ .Values.config.authMode | default "passthrough" | quote }}
            - name: COZYTEMPL_DEV_MODE
              value: {{ .Values.config.devMode | quote }}
            {{- if .Values.config.trustForwardedHeaders }}
            - name: COZYTEMPL_TRUST_FORWARDED_HEADERS
              value: "true"
            {{- end }}
            {{- with .Values.config.debugPprofAddr }}
            - name: COZYTEMPL_DEBUG_PPROF_ADDR
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.config.tracing }}
            {{- with .Values.config.tracing.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.config.tracing.otlpProtocol }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.config.tracing.serviceName }}
            - name: OTEL_SERVICE_NAME
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- $mode := .Values.config.authMode | default "passthrough" }}
            {{- if .Values.config.devMode }}
            {{- $mode = "dev" }}
            {{- end }}
            {{- if or (eq $mode "passthrough") (eq $mode "impersonation-legacy") }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.config.oidc.issuerURL | quote }}
            {{- with .Values.config.oidc.internalIssuerURL }}
            - name: OIDC_INTERNAL_ISSUER_URL
              value: {{ . | quote }}
            {{- end }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.config.oidc.clientID | quote }}
            - name: OIDC_REDIRECT_URL
              value: {{ .Values.config.oidc.redirectURL | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cozytempl.secretName" . }}
                  key: oidc-client-secret
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cozytempl.secretName" . }}
                  key: session-secret
            {{- else if eq $mode "byok" }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cozytempl.secretName" . }}
                  key: session-secret
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
