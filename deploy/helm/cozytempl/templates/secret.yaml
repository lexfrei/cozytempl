{{- /*
  Secret rendering is mode-aware:

  - dev:                  not rendered (no OIDC, no user sessions).
  - byok / token:         rendered with ONLY session-secret; there
                          is no IdP client secret in these modes.
  - passthrough / legacy: rendered with both oidc-client-secret
                          and session-secret.
  - existingSecret set:   always skipped. Operator supplies keys
                          oidc-client-secret (optional in byok/token)
                          and session-secret out-of-band.
*/ -}}
{{- $mode := .Values.config.authMode | default "passthrough" -}}
{{- if .Values.config.devMode -}}
{{-   $mode = "dev" -}}
{{- end -}}
{{- if and (ne $mode "dev") (not .Values.config.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cozytempl.secretName" . }}
  labels:
    {{- include "cozytempl.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if or (eq $mode "passthrough") (eq $mode "impersonation-legacy") }}
  oidc-client-secret: {{ required "config.oidc.clientSecret is required in passthrough and impersonation-legacy modes when no existingSecret is set" .Values.config.oidc.clientSecret | quote }}
  {{- end }}
  session-secret: {{ required "config.oidc.sessionSecret is required when cozytempl uses a session cookie (anything except dev mode) and no existingSecret is set" .Values.config.oidc.sessionSecret | quote }}
{{- end }}
