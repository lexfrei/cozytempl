suite: RBAC
templates:
  - rbac.yaml
  - serviceaccount.yaml
release:
  name: cozytempl
  namespace: cozy-system
tests:
  - it: creates a ServiceAccount when serviceAccount.create is true
    template: serviceaccount.yaml
    set:
      config.authMode: passthrough
      config.oidc.issuerURL: https://sso.example.com/realms/test
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozytempl.example.com/auth/callback
      config.oidc.clientSecret: test
      config.oidc.sessionSecret: testtesttesttesttesttesttesttest
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: cozytempl

  - it: skips the ServiceAccount when serviceAccount.create is false
    template: serviceaccount.yaml
    set:
      config.devMode: true
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: passthrough mode renders NO impersonation role but DOES render the watcher SA + ClusterRole
    template: rbac.yaml
    set:
      config.authMode: passthrough
      config.oidc.issuerURL: https://sso.example.com/realms/test
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozytempl.example.com/auth/callback
      config.oidc.clientSecret: test
      config.oidc.sessionSecret: testtesttesttesttesttesttesttest
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 0
        isKind:
          of: ServiceAccount
      - documentIndex: 0
        equal:
          path: metadata.name
          value: cozytempl-watcher
      - documentIndex: 1
        isKind:
          of: ClusterRole
      - documentIndex: 1
        equal:
          path: metadata.name
          value: cozytempl-watcher
      - documentIndex: 1
        contains:
          path: rules
          content:
            apiGroups:
              - helm.toolkit.fluxcd.io
            resources:
              - helmreleases
            verbs:
              - list
              - watch
      - documentIndex: 2
        isKind:
          of: ClusterRoleBinding
      - documentIndex: 2
        equal:
          path: roleRef.name
          value: cozytempl-watcher

  - it: byok mode is shaped identically to passthrough for RBAC
    template: rbac.yaml
    set:
      config.authMode: byok
      config.oidc.sessionSecret: testtesttesttesttesttesttesttest
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 0
        isKind:
          of: ServiceAccount
      - documentIndex: 0
        equal:
          path: metadata.name
          value: cozytempl-watcher

  - it: token mode is shaped identically to passthrough for RBAC
    template: rbac.yaml
    set:
      config.authMode: token
      config.oidc.sessionSecret: testtesttesttesttesttesttesttest
    asserts:
      - hasDocuments:
          count: 3
      - documentIndex: 0
        isKind:
          of: ServiceAccount
      - documentIndex: 0
        equal:
          path: metadata.name
          value: cozytempl-watcher

  - it: dev mode renders zero RBAC documents
    template: rbac.yaml
    set:
      config.authMode: dev
    asserts:
      - hasDocuments:
          count: 0

  - it: legacy devMode=true wins over authMode and renders zero RBAC documents
    template: rbac.yaml
    set:
      config.authMode: passthrough
      config.devMode: true
    asserts:
      - hasDocuments:
          count: 0

  - it: impersonation-legacy renders the main SA ClusterRole AND the watcher SA
    template: rbac.yaml
    set:
      config.authMode: impersonation-legacy
      config.oidc.issuerURL: https://sso.example.com/realms/test
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozytempl.example.com/auth/callback
      config.oidc.clientSecret: test
      config.oidc.sessionSecret: testtesttesttesttesttesttesttest
    asserts:
      - hasDocuments:
          count: 5
      - documentIndex: 0
        isKind:
          of: ClusterRole
      - documentIndex: 0
        equal:
          path: metadata.name
          value: cozytempl
      - documentIndex: 0
        contains:
          path: rules
          content:
            apiGroups: [""]
            resources:
              - users
              - groups
              - serviceaccounts
            verbs:
              - impersonate
      - documentIndex: 1
        isKind:
          of: ClusterRoleBinding
      - documentIndex: 1
        equal:
          path: roleRef.name
          value: cozytempl
      - documentIndex: 2
        isKind:
          of: ServiceAccount
      - documentIndex: 2
        equal:
          path: metadata.name
          value: cozytempl-watcher

  - it: watcher.enabled=false suppresses the watcher SA even in passthrough mode
    template: rbac.yaml
    set:
      config.authMode: passthrough
      config.oidc.issuerURL: https://sso.example.com/realms/test
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozytempl.example.com/auth/callback
      config.oidc.clientSecret: test
      config.oidc.sessionSecret: testtesttesttesttesttesttesttest
      watcher.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: rbac.create=false suppresses everything
    template: rbac.yaml
    set:
      config.authMode: impersonation-legacy
      config.oidc.issuerURL: https://sso.example.com/realms/test
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozytempl.example.com/auth/callback
      config.oidc.clientSecret: test
      config.oidc.sessionSecret: testtesttesttesttesttesttesttest
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0
