suite: RBAC
templates:
  - rbac.yaml
  - serviceaccount.yaml
release:
  name: cozytempl
  namespace: cozy-system
tests:
  - it: creates a ServiceAccount when serviceAccount.create is true
    template: serviceaccount.yaml
    set:
      config.devMode: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: cozytempl

  - it: skips the ServiceAccount when serviceAccount.create is false
    template: serviceaccount.yaml
    set:
      config.devMode: true
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: ClusterRole grants only impersonation and self-subject review
    template: rbac.yaml
    documentIndex: 0
    set:
      config.devMode: true
    asserts:
      - isKind:
          of: ClusterRole
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources:
              - users
              - groups
              - serviceaccounts
            verbs:
              - impersonate
      - contains:
          path: rules
          content:
            apiGroups:
              - authorization.k8s.io
            resources:
              - selfsubjectaccessreviews
              - selfsubjectrulesreviews
            verbs:
              - create

  - it: ClusterRoleBinding ties the role to the ServiceAccount in the release namespace
    template: rbac.yaml
    documentIndex: 1
    set:
      config.devMode: true
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: roleRef.name
          value: cozytempl
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: cozytempl
            namespace: cozy-system

  - it: rbac.create=false suppresses both ClusterRole and ClusterRoleBinding
    template: rbac.yaml
    set:
      config.devMode: true
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0
