suite: HTTPRoute
templates:
  - httproute.yaml
release:
  name: cozytempl
  namespace: cozy-system
tests:
  - it: disabled by default — zero documents
    set:
      config.authMode: dev
    asserts:
      - hasDocuments:
          count: 0

  - it: enabled renders one HTTPRoute with gateway.networking.k8s.io/v1
    set:
      config.authMode: dev
      httpRoute.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HTTPRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: cozytempl

  - it: parentRefs thread through verbatim
    set:
      config.authMode: dev
      httpRoute.enabled: true
      httpRoute.parentRefs:
        - name: my-gateway
          namespace: gateway-system
          sectionName: https
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: my-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: gateway-system
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https

  - it: hostnames flip into spec.hostnames
    set:
      config.authMode: dev
      httpRoute.enabled: true
      httpRoute.hostnames:
        - cozy.example.com
        - cozy-alt.example.com
    asserts:
      - contains:
          path: spec.hostnames
          content: cozy.example.com
      - contains:
          path: spec.hostnames
          content: cozy-alt.example.com

  - it: empty rules defaults to a single PathPrefix `/` catch-all
    set:
      config.authMode: dev
      httpRoute.enabled: true
      httpRoute.rules: []
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: cozytempl
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8080

  - it: custom rules with matches + filters pass through
    set:
      config.authMode: dev
      httpRoute.enabled: true
      httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /cozytempl
          filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  type: ReplacePrefixMatch
                  replacePrefixMatch: /
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /cozytempl
      - equal:
          path: spec.rules[0].filters[0].type
          value: URLRewrite
      - equal:
          path: spec.rules[0].filters[0].urlRewrite.path.type
          value: ReplacePrefixMatch

  - it: multiple rules with per-rule weight for canary splits
    set:
      config.authMode: dev
      httpRoute.enabled: true
      httpRoute.rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          weight: 90
        - matches:
            - headers:
                - name: x-canary
                  value: "1"
          weight: 10
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].weight
          value: 90
      - equal:
          path: spec.rules[1].backendRefs[0].weight
          value: 10
      - equal:
          path: spec.rules[1].matches[0].headers[0].name
          value: x-canary

  - it: annotations land on the HTTPRoute metadata
    set:
      config.authMode: dev
      httpRoute.enabled: true
      httpRoute.annotations:
        example.com/owner: platform-team
    asserts:
      - equal:
          path: metadata.annotations["example.com/owner"]
          value: platform-team
