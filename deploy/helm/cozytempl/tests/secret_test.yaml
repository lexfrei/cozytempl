suite: Secret
templates:
  - secret.yaml
release:
  name: cozytempl
  namespace: cozy-system
tests:
  - it: dev mode does not render a Secret
    set:
      config.authMode: dev
    asserts:
      - hasDocuments:
          count: 0

  - it: legacy devMode=true does not render a Secret
    set:
      config.devMode: true
    asserts:
      - hasDocuments:
          count: 0

  - it: existingSecret suppresses the chart-rendered Secret
    set:
      config.authMode: passthrough
      config.oidc.issuerURL: https://sso.example.com
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozy.example.com/auth/callback
      config.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: passthrough mode renders a Secret with both keys
    set:
      config.authMode: passthrough
      config.oidc.issuerURL: https://sso.example.com
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozy.example.com/auth/callback
      config.oidc.clientSecret: secret-client
      config.oidc.sessionSecret: VERYSECURESECRET32BYTESATLEASTOK
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: cozytempl
      - equal:
          path: type
          value: Opaque
      - equal:
          path: stringData.oidc-client-secret
          value: secret-client
      - equal:
          path: stringData.session-secret
          value: VERYSECURESECRET32BYTESATLEASTOK

  - it: impersonation-legacy renders a Secret with both keys
    set:
      config.authMode: impersonation-legacy
      config.oidc.issuerURL: https://sso.example.com
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozy.example.com/auth/callback
      config.oidc.clientSecret: legacy-client
      config.oidc.sessionSecret: VERYSECURESECRET32BYTESATLEASTOK
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.oidc-client-secret
          value: legacy-client

  - it: byok mode renders a Secret with only session-secret
    set:
      config.authMode: byok
      config.oidc.sessionSecret: VERYSECURESECRET32BYTESATLEASTOK
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.session-secret
          value: VERYSECURESECRET32BYTESATLEASTOK
      - isNull:
          path: stringData.oidc-client-secret

  - it: missing clientSecret in passthrough mode fails with a helpful required() message
    set:
      config.authMode: passthrough
      config.oidc.issuerURL: https://sso.example.com
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozy.example.com/auth/callback
      config.oidc.sessionSecret: VERYSECURESECRET32BYTESATLEASTOK
    asserts:
      - failedTemplate:
          errorMessage: "config.oidc.clientSecret is required in passthrough and impersonation-legacy modes when no existingSecret is set"

  - it: missing sessionSecret in passthrough mode fails with a helpful required() message
    set:
      config.authMode: passthrough
      config.oidc.issuerURL: https://sso.example.com
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozy.example.com/auth/callback
      config.oidc.clientSecret: secret-client
    asserts:
      - failedTemplate:
          errorMessage: "config.oidc.sessionSecret is required when cozytempl uses a session cookie (anything except dev mode) and no existingSecret is set"

  - it: missing sessionSecret in byok mode fails with a helpful required() message
    set:
      config.authMode: byok
    asserts:
      - failedTemplate:
          errorMessage: "config.oidc.sessionSecret is required when cozytempl uses a session cookie (anything except dev mode) and no existingSecret is set"

  - it: token mode renders a Secret with only session-secret
    set:
      config.authMode: token
      config.oidc.sessionSecret: VERYSECURESECRET32BYTESATLEASTOK
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.session-secret
          value: VERYSECURESECRET32BYTESATLEASTOK
      - isNull:
          path: stringData.oidc-client-secret

  - it: missing sessionSecret in token mode fails with a helpful required() message
    set:
      config.authMode: token
    asserts:
      - failedTemplate:
          errorMessage: "config.oidc.sessionSecret is required when cozytempl uses a session cookie (anything except dev mode) and no existingSecret is set"
