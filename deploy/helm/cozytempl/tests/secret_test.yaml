suite: Secret
templates:
  - secret.yaml
release:
  name: cozytempl
  namespace: cozy-system
tests:
  - it: dev mode does not render a Secret
    set:
      config.devMode: true
    asserts:
      - hasDocuments:
          count: 0

  - it: existingSecret suppresses the chart-rendered Secret
    set:
      config.devMode: false
      config.oidc.issuerURL: https://sso.example.com
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozy.example.com/auth/callback
      config.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: prod mode renders a Secret with both keys
    set:
      config.devMode: false
      config.oidc.issuerURL: https://sso.example.com
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozy.example.com/auth/callback
      config.oidc.clientSecret: secret-client
      config.oidc.sessionSecret: VERYSECURESECRET32BYTESATLEASTOK
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: cozytempl
      - equal:
          path: type
          value: Opaque
      - equal:
          path: stringData.oidc-client-secret
          value: secret-client
      - equal:
          path: stringData.session-secret
          value: VERYSECURESECRET32BYTESATLEASTOK

  - it: missing clientSecret fails with a helpful required() message
    set:
      config.devMode: false
      config.oidc.issuerURL: https://sso.example.com
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozy.example.com/auth/callback
      config.oidc.sessionSecret: VERYSECURESECRET32BYTESATLEASTOK
    asserts:
      - failedTemplate:
          errorMessage: "config.oidc.clientSecret is required when devMode=false and no existingSecret is set"

  - it: missing sessionSecret fails with a helpful required() message
    set:
      config.devMode: false
      config.oidc.issuerURL: https://sso.example.com
      config.oidc.clientID: cozytempl
      config.oidc.redirectURL: https://cozy.example.com/auth/callback
      config.oidc.clientSecret: secret-client
    asserts:
      - failedTemplate:
          errorMessage: "config.oidc.sessionSecret is required when devMode=false and no existingSecret is set"
