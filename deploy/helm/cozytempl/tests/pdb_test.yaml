suite: PodDisruptionBudget
templates:
  - pdb.yaml
release:
  name: cozytempl
  namespace: cozy-system
tests:
  - it: disabled by default — zero documents
    set:
      config.authMode: dev
    asserts:
      - hasDocuments:
          count: 0

  - it: single replica even with enabled=true — zero documents (avoid node-drain deadlock)
    set:
      config.authMode: dev
      podDisruptionBudget.enabled: true
      replicaCount: 1
    asserts:
      - hasDocuments:
          count: 0

  - it: enabled + replicaCount>1 renders a PDB
    set:
      config.authMode: dev
      podDisruptionBudget.enabled: true
      replicaCount: 3
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: cozytempl
      - equal:
          path: spec.minAvailable
          value: 1

  - it: maxUnavailable passes through
    set:
      config.authMode: dev
      podDisruptionBudget.enabled: true
      replicaCount: 3
      podDisruptionBudget.minAvailable: ""
      podDisruptionBudget.maxUnavailable: "50%"
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 50%

  - it: selector matches the Deployment selector labels
    set:
      config.authMode: dev
      podDisruptionBudget.enabled: true
      replicaCount: 3
    asserts:
      - isNotEmpty:
          path: spec.selector.matchLabels
