version: 2
updates:
  # Go module dependencies
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Batch patches and minors together so the inbox isn't flooded
      # with one PR per tiny k8s.io/* bump.
      k8s:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
        update-types:
          - minor
          - patch
      other:
        patterns:
          - "*"
        exclude-patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
        update-types:
          - minor
          - patch

  # npm dev dependencies (TypeScript toolchain + htmx/fonts vendoring)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions pins
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Amsterdam
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope
