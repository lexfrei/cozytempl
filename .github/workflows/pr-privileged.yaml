name: PR Privileged Actions

# Runs after pr.yaml completes. Lives in a separate workflow
# because it needs pull-requests:write and security-events:write —
# permissions we do NOT want exposed to the PR workflow itself,
# since PR code runs untrusted (a fork could theoretically modify
# pr.yaml and self-elevate). workflow_run always uses the
# master-branch version of this file, so the elevated permissions
# cannot be hijacked from a PR.
#
# Two actions:
#   upload-sarif — pulls the trivy SARIF artifact from pr.yaml and
#                  uploads it to GitHub Security Code Scanning.
#   notify       — adds a "Container Available" label the first
#                  time a PR successfully builds, and drops a
#                  single comment with the ttl.sh image + chart
#                  URLs so reviewers can pull the preview locally.

on:
  workflow_run:
    workflows: ["PR Checks and Build"]
    types: [completed]

permissions:
  pull-requests: write
  security-events: write
  actions: read

jobs:
  upload-sarif:
    name: Upload Security Results
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download SARIF artifact
        id: download-sarif
        uses: actions/download-artifact@v4
        with:
          name: trivy-sarif
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        if: steps.download-sarif.outcome == 'success'
        # v4 is the current stable; v3 deprecates in December 2026.
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem
          # (ref, sha) must correspond: refs/pull/N/head → PR head
          # commit SHA (which is what workflow_run.head_sha gives us).
          # Using /merge here demands the virtual merge commit SHA,
          # which GitHub creates separately and is not exposed via
          # workflow_run — the API then rejects the upload with
          # 'ref is a pull request merge but commit_oid is not a
          # merge commit'.
          ref: refs/pull/${{ github.event.workflow_run.pull_requests[0].number }}/head
          sha: ${{ github.event.workflow_run.head_sha }}

  notify:
    name: Notify PR
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download PR metadata
        uses: actions/download-artifact@v4
        with:
          name: pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read and validate PR number
        id: pr
        run: |
          PR_NUMBER=$(cat pr-number.txt)
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Invalid PR number: $PR_NUMBER"
            exit 1
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Check if first build
        id: first_build
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const labels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }}
            });

            const hasLabel = labels.data.some(label => label.name === 'Container Available');
            return hasLabel ? 'false' : 'true';

      - name: Add Container Available label
        if: steps.first_build.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              labels: ['Container Available']
            })

      - name: Comment on PR (first time only)
        if: steps.first_build.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const imageTag = `ttl.sh/lexfrei-cozytempl:pr-${prNumber}-1d`;
            const chartVersion = `0.0.0-pr.${prNumber}-1d`;

            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Container image available\n\n**cozytempl (amd64 + arm64):**\n\`\`\`bash\npodman pull ${imageTag}\n\`\`\`\n\n## Helm chart available\n\n**Install chart:**\n\`\`\`bash\nhelm install cozytempl oci://ttl.sh/cozytempl --version ${chartVersion}\n\`\`\`\n\n> **Note:** Image and chart are rebuilt on every commit and expire after 24 hours (hosted on ttl.sh).`
            })
