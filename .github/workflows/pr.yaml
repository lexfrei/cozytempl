name: PR Checks and Build

# Runs on every PR against master. Mirrors the shape of
# lexfrei/cloudflare-tunnel-gateway-controller's pr.yaml so
# contributors moving between repos see the same workflow layout.
#
# Jobs:
#   save-pr-metadata — stashes the PR number as an artifact so
#                      the privileged workflow_run can pick it up
#                      and comment on the PR from the master side
#                      without granting pull-request:write on the
#                      PR workflow itself (untrusted fork risk).
#   security         — trivy filesystem scan, SARIF artifact
#   lint             — golangci-lint + markdownlint + eslint
#   test             — go test -race + templ generate + TS build
#   lint-chart       — helm lint + helm-unittest + ct lint +
#                      check-jsonschema + ah lint + markdownlint
#   build-and-push   — multi-arch native-runner matrix, pushes
#                      by digest to ttl.sh for ephemeral preview
#   merge-manifests  — assembles the multi-arch manifest list
#                      under ttl.sh/lexfrei-cozytempl:pr-<N>-1d
#   build-chart      — packages the Helm chart with a pr-scoped
#                      version and pushes OCI to ttl.sh as well

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  save-pr-metadata:
    name: Save PR Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Save PR number
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload PR metadata
        uses: actions/upload-artifact@v4
        with:
          name: pr-metadata
          path: pr-number.txt
          retention-days: 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        # Pin to a specific trivy-action tag (not @master) so a
        # broken upstream install script can't turn this job red
        # overnight. 0.35.0 is the same pin lexfrei/cloudflare-
        # tunnel-gateway-controller uses; Renovate will upgrade
        # it on a weekly schedule per .github/renovate.json5.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-fs-results.sarif
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ sources
        run: templ generate

      - name: golangci-lint
        # v9 of the action is required for golangci-lint v2, which
        # in turn is required because our .golangci.yml uses the
        # v2 config schema (linters.default: all / linters.disable
        # shape). The older v6 action's "latest" bound resolves to
        # golangci-lint v1.64.8 — built with Go 1.24 — and then
        # refuses to load a v2 config against a go.mod that
        # targets Go 1.26.2. Pin both the action and the linter
        # binary so a drift cannot re-break the job.
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: ./cmd/... ./internal/... ./static/...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./cmd/... ./internal/...

      - name: eslint
        run: npx eslint static/ts/

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            README.md
            deploy/helm/cozytempl/README.md
            docs/**/*.md

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1001

      - name: Generate templ sources
        run: templ generate

      - name: Build TypeScript bundles
        run: |
          npx esbuild static/ts/main.ts --bundle --outfile=static/dist/bundle.js --minify --sourcemap
          npx esbuild static/ts/theme-early.ts --bundle --outfile=static/dist/theme-early.js --minify

      - name: go test (race)
        run: go test ./cmd/... ./internal/... ./static/... -count=1 -race

      - name: go build
        run: CGO_ENABLED=0 go build -o bin/cozytempl ./cmd/cozytempl

  lint-chart:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Install tools
        run: |
          # helm-unittest — --verify=false because the plugin
          # repo does not ship a plugin.yaml.prov and Helm 4
          # rejects unverified plugins by default.
          helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest.git

          # JSON schema validator for values.yaml / values.schema.json.
          pip install --quiet check-jsonschema

          # Artifact Hub CLI for chart metadata lint.
          AH_VERSION="1.21.0"
          wget --quiet "https://github.com/artifacthub/hub/releases/download/v${AH_VERSION}/ah_${AH_VERSION}_linux_amd64.tar.gz"
          tar --extract --gzip --file "ah_${AH_VERSION}_linux_amd64.tar.gz"
          chmod +x ah
          sudo mv ah /usr/local/bin/ah

      - name: helm lint (dev mode)
        run: helm lint deploy/helm/cozytempl --set config.authMode=dev

      - name: helm lint (passthrough mode)
        run: |
          helm lint deploy/helm/cozytempl \
            --set config.authMode=passthrough \
            --set config.oidc.issuerURL=https://sso.example.com \
            --set config.oidc.clientID=cozytempl \
            --set config.oidc.redirectURL=https://cozy.example.com/auth/callback \
            --set config.oidc.clientSecret=placeholder-secret \
            --set config.oidc.sessionSecret=VERYSECURESECRET32BYTESATLEASTOK

      - name: helm lint (byok mode)
        run: |
          helm lint deploy/helm/cozytempl \
            --set config.authMode=byok \
            --set config.oidc.sessionSecret=VERYSECURESECRET32BYTESATLEASTOK

      - name: chart-testing lint
        run: ct lint --charts deploy/helm/cozytempl --validate-maintainers=false --target-branch=master

      - name: Artifact Hub lint
        run: ah lint --kind helm --path deploy/helm/cozytempl

      - name: Validate values.yaml against schema
        run: check-jsonschema --schemafile deploy/helm/cozytempl/values.schema.json deploy/helm/cozytempl/values.yaml

      - name: helm template (every feature flag on)
        run: |
          helm template cozytempl deploy/helm/cozytempl \
            --set config.authMode=passthrough \
            --set config.oidc.issuerURL=https://sso.example.com \
            --set config.oidc.clientID=cozytempl \
            --set config.oidc.redirectURL=https://cozy.example.com/auth/callback \
            --set config.oidc.clientSecret=placeholder \
            --set config.oidc.sessionSecret=VERYSECURESECRET32BYTESATLEASTOK \
            --set ingress.enabled=true \
            --set httpRoute.enabled=true \
            --set networkPolicy.enabled=true \
            --set podDisruptionBudget.enabled=true \
            --set replicaCount=3 \
            --set autoscaling.enabled=true \
            --set serviceMonitor.enabled=true \
            --set vpa.enabled=true > /dev/null

      - name: helm-unittest
        run: helm unittest deploy/helm/cozytempl

  build-and-push:
    name: Build and Push (${{ matrix.arch }})
    needs: [security, lint, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push to ttl.sh by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ttl.sh/lexfrei-cozytempl,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,scope=build-${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          IMAGE_NAME="ttl.sh/lexfrei-cozytempl"
          TAG="pr-${PR_NUMBER}-1d"

          images=()
          for digest_file in *; do
            [[ -f "$digest_file" ]] || continue
            images+=("${IMAGE_NAME}@sha256:${digest_file}")
          done

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${TAG}" \
            "${images[@]}"

      - name: Inspect image
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          docker buildx imagetools inspect "ttl.sh/lexfrei-cozytempl:pr-${PR_NUMBER}-1d"

      - name: Generate build summary
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          IMAGE_TAG="ttl.sh/lexfrei-cozytempl:pr-${PR_NUMBER}-1d"

          {
            echo "## Multi-arch Container Image"
            echo ""
            echo "### Image Tag"
            echo "- \`${IMAGE_TAG}\`"
            echo ""
            echo "### Platforms"
            echo "- linux/amd64"
            echo "- linux/arm64"
            echo ""
            echo "### Pull Command"
            echo '```bash'
            echo "podman pull ${IMAGE_TAG}"
            echo '```'
            echo ""
            echo "> **Note:** Image expires in 24 hours (ttl.sh)"
          } >> "$GITHUB_STEP_SUMMARY"

  build-chart:
    name: Build Chart
    runs-on: ubuntu-latest
    needs: [security, lint, test, lint-chart]
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Modify Chart.yaml and values.yaml
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          CHART_DIR="deploy/helm/cozytempl"
          CHART_VERSION="0.0.0-pr.${PR_NUMBER}-1d"
          APP_VERSION="pr-${PR_NUMBER}-1d"
          IMAGE_REPO="ttl.sh/lexfrei-cozytempl"
          IMAGE_TAG="pr-${PR_NUMBER}-1d"

          sed -i "s/^version: .*/version: ${CHART_VERSION}/" "${CHART_DIR}/Chart.yaml"
          sed -i "s/^appVersion: .*/appVersion: \"${APP_VERSION}\"/" "${CHART_DIR}/Chart.yaml"
          sed -i "s|repository: .*|repository: ${IMAGE_REPO}|" "${CHART_DIR}/values.yaml"
          sed -i "s/tag: .*/tag: \"${IMAGE_TAG}\"/" "${CHART_DIR}/values.yaml"

      - name: Package chart
        run: |
          set -euo pipefail
          helm package deploy/helm/cozytempl
          ls -lh cozytempl-*.tgz

      - name: Push chart to ttl.sh
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          CHART_VERSION="0.0.0-pr.${PR_NUMBER}-1d"
          CHART_PKG="cozytempl-${CHART_VERSION}.tgz"

          helm push "${CHART_PKG}" oci://ttl.sh

          echo "Chart pushed to: oci://ttl.sh/cozytempl:${CHART_VERSION}"

      - name: Generate chart summary
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          CHART_VERSION="0.0.0-pr.${PR_NUMBER}-1d"

          {
            echo "## Helm Chart"
            echo ""
            echo "### Chart Version"
            echo "- \`${CHART_VERSION}\`"
            echo ""
            echo "### Install Command"
            echo '```bash'
            echo "helm install cozytempl oci://ttl.sh/cozytempl --version ${CHART_VERSION}"
            echo '```'
            echo ""
            echo "> **Note:** Chart expires in 24 hours (ttl.sh)"
          } >> "$GITHUB_STEP_SUMMARY"
