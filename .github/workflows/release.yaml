name: Release

# Triggered only by semver-v tags (v0.0.1, v1.2.3, etc). Produces:
#   1. Multi-arch container image on ghcr.io/lexfrei/cozytempl
#      with full semver, major.minor, major and latest tags,
#      built by native-arch runners (no QEMU) and signed with
#      cosign keyless via the GitHub OIDC id-token.
#   2. Helm chart OCI artifact on ghcr.io/lexfrei/charts/cozytempl
#      with the same version set, packaged from the tag, signed
#      by cosign, with an Artifact Hub repo metadata companion
#      pushed under the `artifacthub.io` special tag.
#   3. GitHub Release with auto-generated changelog from
#      conventional-commit messages and the chart .tgz attached
#      as a release asset.
#
# Shape follows lexfrei/cloudflare-tunnel-gateway-controller
# release.yaml so a contributor moving between repos sees one
# uniform release pipeline.

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CHART_NAME: cozytempl
  CHART_OCI_REPO: ghcr.io/${{ github.repository_owner }}/charts/cozytempl
  IMAGE_REPO: ghcr.io/${{ github.repository }}

jobs:
  lint-chart:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Install tools
        run: |
          helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest.git
          pip install --quiet check-jsonschema

      - name: helm lint (passthrough mode)
        run: |
          helm lint deploy/helm/cozytempl \
            --set config.authMode=passthrough \
            --set config.oidc.issuerURL=https://sso.example.com \
            --set config.oidc.clientID=cozytempl \
            --set config.oidc.redirectURL=https://cozy.example.com/auth/callback \
            --set config.oidc.clientSecret=placeholder-secret \
            --set config.oidc.sessionSecret=VERYSECURESECRET32BYTESATLEASTOK

      - name: chart-testing lint
        run: ct lint --charts deploy/helm/cozytempl --validate-maintainers=false --target-branch=master

      - name: Validate values.yaml against schema
        run: check-jsonschema --schemafile deploy/helm/cozytempl/values.schema.json deploy/helm/cozytempl/values.yaml

      - name: helm-unittest
        run: helm unittest deploy/helm/cozytempl

  build-and-push:
    name: Build and Push (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare platform identifier
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=cozytempl
            org.opencontainers.image.description=Web UI for Cozystack platform management
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and Push by Digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_REPO }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ steps.platform.outputs.pair }}
          cache-to: type=gha,scope=build-${{ steps.platform.outputs.pair }},mode=max
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.platform.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail

          # shellcheck disable=SC2046
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${{ env.IMAGE_REPO }}@sha256:%s " *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.version }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.meta.outputs.version }}
        run: |
          # Sign each tag's resolved digest via OIDC keyless. Using
          # the manifest-list digest from the inspect step ensures
          # the signature attaches to the multi-arch index, not
          # one arm's child manifest.
          IMAGE_DIGEST=$(docker buildx imagetools inspect "${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.version }}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          cosign sign --yes "${{ env.IMAGE_REPO }}@${IMAGE_DIGEST}"
          echo "Signed: ${{ env.IMAGE_REPO }}@${IMAGE_DIGEST}"

  publish-chart:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [build-and-push, lint-chart]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install yq
        run: |
          YQ_VERSION="4.44.3"
          wget --quiet "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64" --output-document yq
          chmod +x yq
          sudo mv yq /usr/local/bin/yq

      - name: Generate changelog from commits
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --format="%s" --no-merges)
          else
            COMMITS=$(git log --format="%s" --no-merges)
          fi

          CHANGELOG_FILE=$(mktemp)
          echo "[]" > "$CHANGELOG_FILE"

          while IFS= read -r commit; do
            [ -z "$commit" ] && continue

            if [[ "$commit" =~ ^(feat|fix|security|refactor|docs|perf|build)(\([^\)]+\))?:\ (.+)$ ]]; then
              TYPE="${BASH_REMATCH[1]}"
              SCOPE="${BASH_REMATCH[2]}"
              DESC="${BASH_REMATCH[3]}"

              SCOPE="${SCOPE#\(}"
              SCOPE="${SCOPE%\)}"

              case "$TYPE" in
                feat) KIND="added" ;;
                fix) KIND="fixed" ;;
                security) KIND="security" ;;
                *) KIND="changed" ;;
              esac

              if [ -n "$SCOPE" ]; then
                FULL_DESC="${SCOPE}: ${DESC}"
              else
                FULL_DESC="${DESC}"
              fi

              export KIND FULL_DESC
              yq eval '. += [{"kind": strenv(KIND), "description": strenv(FULL_DESC)}]' \
                --inplace "$CHANGELOG_FILE"
            fi
          done <<< "$COMMITS"

          if [ "$(cat "$CHANGELOG_FILE")" = "[]" ]; then
            rm "$CHANGELOG_FILE"
            echo "yaml=" >> "$GITHUB_OUTPUT"
          else
            CHANGELOG_YAML=$(cat "$CHANGELOG_FILE")
            rm "$CHANGELOG_FILE"
            {
              echo "yaml<<EOF"
              echo "$CHANGELOG_YAML"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Update Chart version and changelog
        env:
          CHANGELOG_YAML: ${{ steps.changelog.outputs.yaml }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHART_PATH="deploy/helm/cozytempl"

          yq eval ".version = \"${VERSION}\"" --inplace "${CHART_PATH}/Chart.yaml"
          yq eval ".appVersion = \"${VERSION}\"" --inplace "${CHART_PATH}/Chart.yaml"

          if [ -n "$CHANGELOG_YAML" ]; then
            yq eval ".annotations.\"artifacthub.io/changes\" = strenv(CHANGELOG_YAML)" --inplace "${CHART_PATH}/Chart.yaml"
          fi

          cat "${CHART_PATH}/Chart.yaml"

      - name: Pin image tag in values.yaml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHART_PATH="deploy/helm/cozytempl"
          yq eval ".image.tag = \"${VERSION}\"" --inplace "${CHART_PATH}/values.yaml"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          CHART_PATH="deploy/helm/cozytempl"

          helm package "${CHART_PATH}"
          CHART_FILE="${{ env.CHART_NAME }}-${VERSION}.tgz"

          # Extract Chart.yaml to build the JSON config layer
          # Helm OCI spec requires a JSON config blob (helm does
          # json.Marshal(metadata) internally).
          tar --extract --gzip --file "${CHART_FILE}" "${{ env.CHART_NAME }}/Chart.yaml"
          yq eval --output-format=json "${{ env.CHART_NAME }}/Chart.yaml" > "${{ env.CHART_NAME }}/config.json"

          # Push chart with oras so we have full path control over
          # the OCI reference. Media types per Helm OCI spec.
          oras push "${{ env.CHART_OCI_REPO }}:${VERSION}" \
            --config "${{ env.CHART_NAME }}/config.json:application/vnd.cncf.helm.config.v1+json" \
            "${CHART_FILE}:application/vnd.cncf.helm.chart.content.v1.tar+gzip"

          rm --recursive --force "${{ env.CHART_NAME }}"

          # Add the standard semver tag family alongside the full
          # version so `helm install ... --version 0.1` works too.
          MAJOR_MINOR=$(echo "${VERSION}" | cut --delimiter=. --fields=1,2)
          MAJOR=$(echo "${VERSION}" | cut --delimiter=. --fields=1)

          oras tag "${{ env.CHART_OCI_REPO }}:${VERSION}" \
            "${MAJOR_MINOR}" \
            "${MAJOR}" \
            "latest"

      - name: Push Artifact Hub metadata
        run: |
          CHART_PATH="deploy/helm/cozytempl"

          oras push "${{ env.CHART_OCI_REPO }}:artifacthub.io" \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            "${CHART_PATH}/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml"

      - name: Sign Helm chart with cosign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHART_DIGEST=$(oras manifest fetch "${{ env.CHART_OCI_REPO }}:${VERSION}" --descriptor | jq --raw-output '.digest')
          cosign sign --yes "${{ env.CHART_OCI_REPO }}@${CHART_DIGEST}"

      - name: Generate chart summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR_MINOR=$(echo "${VERSION}" | cut --delimiter=. --fields=1,2)
          MAJOR=$(echo "${VERSION}" | cut --delimiter=. --fields=1)

          {
            echo "## Helm Chart"
            echo ""
            echo "**Available tags**: \`${VERSION}\`, \`${MAJOR_MINOR}\`, \`${MAJOR}\`, \`latest\`"
            echo ""
            echo "### Installation"
            echo "\`\`\`bash"
            echo "helm install ${{ env.CHART_NAME }} \\"
            echo "  oci://${{ env.CHART_OCI_REPO }} \\"
            echo "  --version ${VERSION}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: "*.tgz"
          retention-days: 5

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [merge-manifests, publish-chart]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --format="%s" --no-merges)
          else
            COMMITS=$(git log --format="%s" --no-merges)
          fi

          CHANGELOG_SECTION=""
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue

            if [[ "$commit" =~ ^(feat|fix|security|refactor|docs|perf|build)(\([^\)]+\))?:\ (.+)$ ]]; then
              TYPE="${BASH_REMATCH[1]}"
              SCOPE="${BASH_REMATCH[2]}"
              DESC="${BASH_REMATCH[3]}"
              SCOPE="${SCOPE#\(}"; SCOPE="${SCOPE%\)}"

              case "$TYPE" in
                feat) emoji="✨" ;;
                fix) emoji="🐛" ;;
                security) emoji="🔒" ;;
                *) emoji="🔄" ;;
              esac

              if [ -n "$SCOPE" ]; then
                CHANGELOG_SECTION="${CHANGELOG_SECTION}- ${emoji} ${SCOPE}: ${DESC}"$'\n'
              else
                CHANGELOG_SECTION="${CHANGELOG_SECTION}- ${emoji} ${DESC}"$'\n'
              fi
            fi
          done <<< "$COMMITS"

          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION="No user-facing changes in this release."
          fi

          {
            echo "## Changelog"
            echo ""
            echo "${CHANGELOG_SECTION}"
            echo "## Installation"
            echo ""
            echo "### Helm chart"
            echo ""
            echo "\`\`\`bash"
            echo "helm install ${{ env.CHART_NAME }} \\"
            echo "  oci://${{ env.CHART_OCI_REPO }} \\"
            echo "  --version ${VERSION}"
            echo "\`\`\`"
            echo ""
            echo "### Container image"
            echo ""
            echo "\`\`\`bash"
            echo "podman pull ${{ env.IMAGE_REPO }}:${VERSION}"
            echo "\`\`\`"
            echo ""
            echo "## Verification"
            echo ""
            echo "### Helm chart (cosign keyless)"
            echo ""
            echo "\`\`\`bash"
            echo "cosign verify \\"
            echo "  ${{ env.CHART_OCI_REPO }}:${VERSION} \\"
            echo "  --certificate-identity-regexp=https://github.com/${{ github.repository }} \\"
            echo "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com"
            echo "\`\`\`"
            echo ""
            echo "### Container image (cosign keyless)"
            echo ""
            echo "\`\`\`bash"
            echo "cosign verify \\"
            echo "  ${{ env.IMAGE_REPO }}:${VERSION} \\"
            echo "  --certificate-identity-regexp=https://github.com/${{ github.repository }} \\"
            echo "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com"
            echo "\`\`\`"
          } > release-notes.md

      - name: Download chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            ./artifacts/*.tgz
