name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-flight runs for the same branch so a quick re-push
# doesn't burn duplicate minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go build + test + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Set up Node.js
        # esbuild bundling + eslint run through npm. Node 20 LTS
        # matches what the Containerfile uses.
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Install Go tools
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Generate templ sources
        run: templ generate

      - name: Build TypeScript bundles
        run: |
          npx esbuild static/ts/main.ts --bundle --outfile=static/dist/bundle.js --minify --sourcemap
          npx esbuild static/ts/theme-early.ts --bundle --outfile=static/dist/theme-early.js --minify

      - name: go test (race)
        run: go test ./cmd/... ./internal/... ./static/... -count=1 -race

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: ./cmd/... ./internal/... ./static/...

      - name: govulncheck
        run: govulncheck ./cmd/... ./internal/...

      - name: eslint
        run: npx eslint static/ts/

      - name: go build
        run: CGO_ENABLED=0 go build -o bin/cozytempl ./cmd/cozytempl

  helm:
    name: Helm chart lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Set up Python
        # check-jsonschema is a Python tool. Using 3.12 to match
        # what lexfrei/charts uses so we stay on a single pinned
        # stack across the owner's repos.
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Install helm-unittest
        # --verify=false is required because helm-unittest does
        # not ship a plugin.yaml.prov signature, and Helm 4 now
        # treats verification as mandatory by default. The
        # plugin is installed from a public GitHub release, so
        # we're trusting the tarball hash transport (HTTPS).
        # Same pattern as lexfrei/charts/.github/workflows/test.yaml.
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest.git

      - name: Install check-jsonschema
        # Validates values.yaml against values.schema.json —
        # a typo in the defaults that the schema catches here
        # saves a helm install --dry-run later.
        run: pip install --quiet check-jsonschema

      - name: Install markdownlint-cli
        run: npm install --global markdownlint-cli

      - name: helm lint (dev mode)
        run: helm lint deploy/helm/cozytempl --set config.devMode=true

      - name: helm lint (prod mode)
        run: |
          helm lint deploy/helm/cozytempl \
            --set config.oidc.issuerURL=https://sso.example.com \
            --set config.oidc.clientID=cozytempl \
            --set config.oidc.redirectURL=https://cozy.example.com/auth/callback \
            --set config.oidc.clientSecret=placeholder-secret \
            --set config.oidc.sessionSecret=VERYSECURESECRET32BYTESATLEASTOK

      - name: chart-testing lint
        # ct lint layers additional best-practice checks on top
        # of helm lint: semver bumps, Chart.yaml required fields,
        # icon presence, templated-name uniqueness, etc.
        run: ct lint --charts deploy/helm/cozytempl --validate-maintainers=false --target-branch=master

      - name: Validate values.yaml against schema
        run: check-jsonschema --schemafile deploy/helm/cozytempl/values.schema.json deploy/helm/cozytempl/values.yaml

      - name: markdownlint README
        # Lint top-level README, chart README, and docs/. A
        # broken markdown table or missing heading level in a
        # shipped README is embarrassing and cheap to catch.
        # Config lives in .markdownlint.yaml — MD013 is off
        # because the project deliberately doesn't hard-wrap
        # markdown for GitHub rendering.
        run: markdownlint README.md deploy/helm/cozytempl/README.md docs/

      - name: helm-unittest
        run: helm unittest deploy/helm/cozytempl
