root = "."
tmp_dir = "tmp"

[build]
  cmd = "templ generate && go build -o ./tmp/cozytempl ./cmd/cozytempl"
  bin = "./tmp/cozytempl"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "node_modules", "static/dist"]
  exclude_regex = ["_test.go", "_templ.go"]
  include_ext = ["go", "templ", "css", "js"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
